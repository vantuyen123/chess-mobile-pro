name: chess_game
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Chess Logic
  chess: ^0.8.1

  # State Management
  flutter_bloc: ^9.1.1
  provider: ^6.1.2
  equatable: ^2.0.7

  # Dependency Injection
  get_it: ^8.0.0
  injectable: ^2.5.0

  # Functional Programming & Utilities
  dartz: ^0.10.1
  flutter_svg: ^2.2.4
  chess_interface: ^1.1.6
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.4.15
  injectable_generator: ^2.6.2
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/chess_pieces/
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
